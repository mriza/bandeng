<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeng - Easy Mikrotik Hotspot IP Binding Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; display: flex; flex-direction: column; height: 100vh; }
        .container { flex: 1; padding: 20px; overflow-y: auto; }
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        .main-container { display: none; flex: 1; flex-direction: column; }
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%; max-width: 400px; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: black; }
        .form-group { margin-bottom: 10px; }
        label { display: block; }
        input, button { padding: 8px; margin: 5px 0; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .status { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="login-container" id="login-container">
        <div class="container">
            <div style="text-align: center; margin-bottom: 20px;">
                <img src="appicon.png" alt="Bandeng Icon" style="width: 80px; height: 80px; vertical-align: middle;">
                <h1 style="margin: 10px 0 5px 0;">Bandeng</h1>
                <p style="color: #666; margin: 0; font-style: italic;">Easy Mikrotik Hotspot IP Binding Management</p>
            </div>
            <div id="connection">
                <h2>Connection</h2>
                <div class="form-group">
                    <label for="address">Router Address (default port 8728):</label>
                    <input type="text" id="address" placeholder="192.168.88.1">
                </div>
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" placeholder="admin">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password">
                </div>
                <button onclick="connect()">Connect</button>
            </div>
        </div>
    </div>

    <div class="main-container" id="main-container">
        <div class="container">
            <div style="display: flex; align-items: center; margin-bottom: 20px;">
                <img src="appicon.png" alt="Bandeng Icon" style="width: 50px; height: 50px; margin-right: 15px;">
                <div>
                    <h1 style="margin: 0; font-size: 24px;">Bandeng</h1>
                    <p style="color: #666; margin: 0; font-size: 14px; font-style: italic;">Easy Mikrotik Hotspot IP Binding Management</p>
                </div>
            </div>

            <div id="system-info" style="display: none;">
                <h2>System Info</h2>
                <p id="sys-info"></p>
            </div>

            <div id="bindings" style="display: none;">
                <h2>IP Bindings</h2>
                <button onclick="loadBindings()">Reload Bindings</button>
                <button onclick="openModal()">Add Binding</button>
                <table id="bindings-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>IP Address</th>
                            <th>MAC Address</th>
                            <th>Type</th>
                            <th>Comment</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bindings-body"></tbody>
                </table>
                <div id="pagination-controls" style="margin-top: 10px; text-align: center;">
                    <button id="prev-page">Previous</button>
                    <span id="page-info" style="margin: 0 10px;"></span>
                    <button id="next-page">Next</button>
                </div>
            </div>

            <div id="logs" style="display: none;">
                <h2>Activity Logs</h2>
                <button onclick="loadLogs()">Refresh Logs</button>
                <textarea id="logs-text" rows="10" cols="80" readonly style="width: 100%; font-family: monospace;"></textarea>
            </div>
        </div>
        <button class="logout-btn" onclick="disconnect()">Logout</button>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>Add New Binding</h3>
            <div class="form-group">
                <label for="modal-mac">MAC Address:</label>
                <input type="text" id="modal-mac" placeholder="AA:BB:CC:DD:EE:FF">
                <span id="mac-error" style="color: red; font-size: 12px; display: block; margin-top: 5px;"></span>
            </div>
            <div class="form-group">
                <label for="modal-server">Server:</label>
                <select id="modal-server">
                    <!-- Options will be populated by JavaScript -->
                </select>
            </div>
            <div class="form-group">
                <label for="modal-type">Type:</label>
                <select id="modal-type">
                    <option value="regular">Regular</option>
                    <option value="bypassed">Bypassed</option>
                    <option value="blocked">Blocked</option>
                </select>
            </div>
            <div class="form-group">
                <label for="modal-comment">Comment:</label>
                <input type="text" id="modal-comment">
            </div>
            <button onclick="addBinding()">Add Binding</button>
        </div>
    </div>

    <div class="status" id="status"></div>

    <script src="app.js"></script>
</body>
</html>
