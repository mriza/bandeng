name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: bandeng-linux
            binary_name: bandeng-rs
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: bandeng-windows.exe
            binary_name: bandeng-rs.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: bandeng-macos
            binary_name: bandeng-rs

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y fontconfig libfontconfig1-dev

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build Release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Rename Artifact (Unix)
      if: runner.os != 'Windows'
      run: mv target/${{ matrix.target }}/release/${{ matrix.binary_name }} ${{ matrix.artifact_name }}

    - name: Rename Artifact (Windows)
      if: runner.os == 'Windows'
      run: Rename-Item -Path "target\${{ matrix.target }}\release\${{ matrix.binary_name }}" -NewName "${{ matrix.artifact_name }}"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.artifact_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
